// ============ CANVAS ============
function Canvas({ data, tree, levelsCount, zoom, setZoom, chartRef, viewMode, setViewMode, orientation, setOrientation, compact, setCompact, pdfPaginate, setPdfPaginate, selectedId, onNodeClick, onAddFirst }) {
  const today = new Date().toLocaleDateString('pt-BR');
  const treeCls = `tree ${orientation === 'lr' ? 'lr' : ''} ${compact ? 'compact' : ''}`.trim();

  return (
    <main className="canvas">
      <div className="canvas-header">
        <div className="canvas-title">
          <h1>Organograma</h1>
          <div className="sub">
            {data.employees.length} {data.employees.length === 1 ? 'pessoa' : 'pessoas'} · {data.roles.length} cargos · {levelsCount} {levelsCount === 1 ? 'nível' : 'níveis'}
          </div>
        </div>
        <div className="canvas-tools" style={{flexWrap:'wrap', justifyContent:'flex-end', gap:10}}>
          <div className="seg seg-accent" role="tablist" aria-label="Visão">
            <span className="seg-label">Visão</span>
            <button
              className={`seg-btn ${viewMode === 'departments' ? 'active' : ''}`}
              onClick={() => setViewMode('departments')}
              title="Árvore de departamentos — estrutura da empresa">
              <span className="seg-ico">A</span> Estrutura
            </button>
            <button
              className={`seg-btn ${viewMode === 'roles' ? 'active' : ''}`}
              onClick={() => setViewMode('roles')}
              title="Árvore de cargos com quem reporta a quem">
              <span className="seg-ico">B</span> Cargos
            </button>
            <button
              className={`seg-btn ${viewMode === 'operational' ? 'active' : ''}`}
              onClick={() => setViewMode('operational')}
              title="Hierarquia operacional de pessoas">
              <span className="seg-ico">C</span> Operacional
            </button>
          </div>

          <div className="seg" role="tablist" aria-label="Orientação">
            <span className="seg-label">Direção</span>
            <button
              className={`seg-btn ${orientation === 'tb' ? 'active' : ''}`}
              onClick={() => setOrientation('tb')}
              title="Árvore de cima para baixo">
              <span className="seg-ico">↓</span> Vertical
            </button>
            <button
              className={`seg-btn ${orientation === 'lr' ? 'active' : ''}`}
              onClick={() => setOrientation('lr')}
              title="Árvore da esquerda para a direita (melhor para o PDF largo)">
              <span className="seg-ico">→</span> Horizontal
            </button>
          </div>

          <button
            className={`btn-toggle ${compact ? 'on' : ''}`}
            onClick={() => setCompact(c => !c)}
            title="Reduz espaçamento entre cards — use em hierarquias grandes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              {compact
                ? <><path d="M4 9h6V3"/><path d="M20 9h-6V3"/><path d="M4 15h6v6"/><path d="M20 15h-6v6"/></>
                : <><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></>
              }
            </svg>
            {compact ? 'Compacto' : 'Normal'}
          </button>

          <div className="zoom" aria-label="Zoom">
            <button onClick={() => setZoom(z => Math.max(40, z - 10))} title="Diminuir zoom">−</button>
            <div className="zoom-val">{zoom}%</div>
            <button onClick={() => setZoom(z => Math.min(200, z + 10))} title="Aumentar zoom">+</button>
          </div>
          <button className="btn" onClick={() => setZoom(100)} title="Resetar zoom"><Icon.Fit /> 100%</button>
        </div>
      </div>

      <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:14, flexWrap:'wrap'}}>
        <label className={`check-pill ${pdfPaginate ? 'on' : ''}`}>
          <input type="checkbox" checked={pdfPaginate} onChange={e => setPdfPaginate(e.target.checked)} />
          <span className="check-box"></span>
          <span>Quebrar PDF em páginas por diretoria</span>
        </label>
        <span style={{fontSize:11.5, color:'var(--ink-mute)', fontFamily:'IBM Plex Mono, monospace'}}>
          recomendado para hierarquias grandes
        </span>
      </div>

      <div className="chart-wrap">
        {(() => {
          const emptyDept = (data.departments||[]).length === 0 && data.roles.length === 0;
          const emptyRoles = data.roles.length === 0;
          const emptyEmpl = data.employees.length === 0;
          return (
            (viewMode === 'departments' && emptyDept) ||
            (viewMode === 'roles' && emptyRoles) ||
            (viewMode === 'operational' && emptyEmpl)
          );
        })() ? (
          <div className="empty" style={{padding:'80px 20px'}}>
            <div className="empty-icon"><Icon.Org /></div>
            <h3>
              {viewMode === 'departments' ? 'Sem estrutura cadastrada'
               : viewMode === 'roles' ? 'Sem cargos cadastrados'
               : 'Comece pelo topo'}
            </h3>
            <p>
              {viewMode === 'departments' ? 'Cadastre departamentos na aba "Depto".'
               : viewMode === 'roles' ? 'Cadastre cargos na aba "Cargos" e defina a hierarquia de reporte.'
               : 'Cadastre o primeiro funcionário (ex: Diretor) para iniciar o organograma.'}
            </p>
            <button className="btn btn-primary" onClick={onAddFirst}><Icon.Plus /> {
              viewMode === 'departments' ? 'Ir para Departamentos'
              : viewMode === 'roles' ? 'Ir para Cargos'
              : 'Adicionar primeira pessoa'
            }</button>
          </div>
        ) : (
          <div ref={chartRef} className="chart-zoom" style={{transform:`scale(${zoom/100})`}}>
            <div className="chart-meta">
              <div>
                <div className="co-name">{data.company.name}</div>
                <div style={{marginTop:2}}>
                  {viewMode === 'departments' ? 'visão A · estrutura'
                   : viewMode === 'roles' ? 'visão B · cargos'
                   : 'visão C · operacional'} · atualizado em {today}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div>{data.employees.length} colaboradores · {data.roles.length} cargos · {(data.departments||[]).length} depto</div>
                <div style={{marginTop:2}}>{levelsCount} níveis · {tree.length} {tree.length === 1 ? 'raiz' : 'raízes'}</div>
              </div>
            </div>

            {tree.map((root, idx) => {
              let headerTitle, headerSub;
              const deptMap = Object.fromEntries((data.departments||[]).map(d => [d.id, d]));
              if (viewMode === 'departments') {
                headerTitle = root.name || '—';
                headerSub = root._virtual ? 'sem vínculo' : '';
              } else if (viewMode === 'roles') {
                headerTitle = root.name || '—';
                const dn = deptMap[root.role?.departmentId]?.name;
                headerSub = dn || '';
              } else {
                const dn = deptMap[root.role?.departmentId]?.name;
                headerTitle = dn || root.name;
                headerSub = root.role?.name || '';
              }
              return (
              <section key={root.id} className={`pdf-section ${idx > 0 ? 'break' : ''}`} style={{marginBottom: pdfPaginate ? 36 : 0, pageBreakInside:'avoid', breakInside:'avoid'}}>
                {pdfPaginate && tree.length > 1 && (
                  <div style={{fontFamily:'IBM Plex Mono, monospace', fontSize:11, color:'var(--ink-mute)', margin:'0 0 12px', paddingBottom:8, borderBottom:'1px dashed var(--line-strong)'}}>
                    <strong style={{color:'var(--ink)', fontFamily:'IBM Plex Sans, sans-serif', fontSize:14}}>
                      {headerTitle}
                    </strong>
                    {headerSub ? ` · ${headerSub}` : ''}
                    {' · '}raiz {idx+1} de {tree.length}
                  </div>
                )}
                <div className={treeCls}>
                  <ul>
                    <TreeNode node={root} depth={0} viewMode={viewMode} selectedId={selectedId} onNodeClick={onNodeClick} data={data} />
                  </ul>
                </div>
              </section>
              );
            })}

            <div className="legend">
              <div><span className="sw diretoria"></span>Diretoria (N0)</div>
              <div><span className="sw gerencia"></span>Gerência (N1)</div>
              <div><span className="sw operacao"></span>Operação (N2–N3)</div>
              <div style={{marginLeft:'auto'}}>clique em um card para editar</div>
            </div>
          </div>
        )}
      </div>
    </main>
  );
}

function TreeNode({ node, depth, viewMode, selectedId, onNodeClick, data }) {
  const isRoot = depth === 0;
  const isSelected = node.id === selectedId;

  // ===== Visão A · Estrutura — card limpo de departamento =====
  if (viewMode === 'departments') {
    const cls = ['node', 'dept-node', 'dept-clean'];
    if (isRoot) cls.push('root');
    if (isSelected) cls.push('selected');
    if (node._virtual) cls.push('virtual');

    return (
      <li>
        <div className={cls.join(' ')} onClick={(e) => { e.stopPropagation(); onNodeClick(node.id); }}>
          <div className="node-head">
            <div className="node-avatar dept-av">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 21h18"/><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 21V11h8v10"/><path d="M3 7l9-4 9 4"/>
              </svg>
            </div>
            <div className="node-head-text">
              <div className="node-name">{node.name}</div>
              <div className="node-role">
                {node.roleCount} {node.roleCount === 1 ? 'cargo' : 'cargos'} · {node.peopleCount} {node.peopleCount === 1 ? 'pessoa' : 'pessoas'}
              </div>
            </div>
          </div>
          {node.children.length > 0 && (
            <div className="node-foot">
              <span>sub-departamentos</span>
              <span className="rep-count">{node.children.length}</span>
            </div>
          )}
        </div>
        {node.children.length > 0 && (
          <ul>
            {node.children
              .slice()
              .sort((a,b) => (a.name||'').localeCompare(b.name||''))
              .map(c => <TreeNode key={c.id} node={c} depth={depth+1} viewMode={viewMode} selectedId={selectedId} onNodeClick={onNodeClick} data={data} />)}
          </ul>
        )}
      </li>
    );
  }

  // ===== Visão B · Cargos — cada cargo um card, depto como tag contextual =====
  if (viewMode === 'roles') {
    const role = node.role;
    const dep = node.department;
    const hc = (node.holders || []).length;

    const cls = ['node'];
    if (isRoot) cls.push('root');
    else if (role?.level === 1) cls.push('l1');
    if (isSelected) cls.push('selected');
    if (hc === 0) cls.push('vacant');

    return (
      <li>
        <div className={cls.join(' ')} onClick={(e) => { e.stopPropagation(); onNodeClick(node.id); }}>
          <div className="role-tag">{dep?.name || 'sem departamento'}</div>
          <div className="node-head">
            <div className="node-avatar">N{role?.level ?? '?'}</div>
            <div className="node-head-text">
              <div className="node-name">{node.name}</div>
              <div className="node-role">
                {hc === 0
                  ? <span className="vacant-tag">vaga em aberto</span>
                  : `${hc} ${hc === 1 ? 'ocupante' : 'ocupantes'}`}
              </div>
            </div>
          </div>
          <div className="node-foot">
            <span>nível {role?.level ?? '—'}</span>
            <span className="rep-count">{node.children.length} {node.children.length === 1 ? 'subordinado' : 'subordinados'}</span>
          </div>
        </div>
        {node.children.length > 0 && (
          <ul>
            {node.children
              .slice()
              .sort((a,b) => (a.role?.level||99) - (b.role?.level||99) || (a.name||'').localeCompare(b.name||''))
              .map(c => <TreeNode key={c.id} node={c} depth={depth+1} viewMode={viewMode} selectedId={selectedId} onNodeClick={onNodeClick} data={data} />)}
          </ul>
        )}
      </li>
    );
  }

  // ===== Visão C · Operacional — nó de funcionário =====
  const role = node.role;
  const cls = ['node'];
  if (isRoot) cls.push('root');
  else if (role?.level === 1) cls.push('l1');
  if (isSelected) cls.push('selected');

  const deptMap = Object.fromEntries((data?.departments||[]).map(d => [d.id, d]));
  const deptName = deptMap[role?.departmentId]?.name;
  const tagText = role
    ? (deptName || LEVEL_NAMES[Math.min(3, role.level)] || 'Operação')
    : 'Sem cargo';

  return (
    <li>
      <div className={cls.join(' ')} onClick={(e) => { e.stopPropagation(); onNodeClick(node.id); }}>
        <div className="role-tag">{tagText}</div>
        <div className="node-head">
          <div className="node-avatar">{initials(node.name)}</div>
          <div className="node-head-text">
            <div className="node-name">{node.name}</div>
            <div className="node-role">{role?.name || 'Sem cargo'}</div>
          </div>
        </div>
        <div className="node-foot">
          <span>nível {role?.level ?? '—'}</span>
          <span className="rep-count">{node.children.length} {node.children.length === 1 ? 'reporte' : 'reportes'}</span>
        </div>
      </div>
      {node.children.length > 0 && (
        <ul>
          {node.children
            .slice()
            .sort((a,b) => (a.role?.level||99) - (b.role?.level||99) || a.name.localeCompare(b.name))
            .map(c => <TreeNode key={c.id} node={c} depth={depth+1} viewMode={viewMode} selectedId={selectedId} onNodeClick={onNodeClick} data={data} />)}
        </ul>
      )}
    </li>
  );
}

// ============ DRAWERS ============
function EmployeeDrawer({ data, employee, isNew, onClose, onSave, onDelete, onNewRole }) {
  const init = employee || { id: 'e_' + uid(), name: '', roleId: data.roles[0]?.id || null, email: '', reportsTo: null };
  const [form, setForm] = useState(init);

  // Esc closes
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  // Candidate superiors: exclude self and descendants
  const candidates = useMemo(() => {
    if (!employee) return data.employees;
    const descendants = new Set();
    const walk = (id) => {
      data.employees.filter(x => x.reportsTo === id).forEach(x => { descendants.add(x.id); walk(x.id); });
    };
    walk(employee.id);
    return data.employees.filter(e => e.id !== employee.id && !descendants.has(e.id));
  }, [data.employees, employee]);

  const roleMap = Object.fromEntries(data.roles.map(r => [r.id, r]));
  const directReports = employee ? data.employees.filter(e => e.reportsTo === employee.id) : [];
  const currentSup = employee?.reportsTo ? data.employees.find(e => e.id === employee.reportsTo) : null;

  const canSave = form.name.trim().length > 0;

  const handleSave = () => {
    if (!canSave) return;
    onSave({ ...form, name: form.name.trim() });
  };
  const handleDelete = () => {
    if (!employee) return;
    if (!confirm(`Excluir ${employee.name}? ${directReports.length > 0 ? `${directReports.length} pessoa(s) que se reportava(m) a ele(a) ficará(ão) sem superior.` : ''}`)) return;
    onDelete(employee.id);
  };

  return (
    <>
      <div className="scrim" onClick={onClose}></div>
      <aside className="drawer" role="dialog">
        <div className="drawer-head">
          <div>
            <h3>{isNew ? 'Novo funcionário' : 'Editar funcionário'}</h3>
            <div className="drawer-sub">{isNew ? 'preencha os dados básicos' : `id: ${employee.id}`}</div>
          </div>
          <button className="close-btn" onClick={onClose}><Icon.Close /></button>
        </div>

        <div className="drawer-body">
          <div className="subform-label first">Dados pessoais</div>
          <div className="field">
            <label>Nome completo *</label>
            <input className="input" autoFocus value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Ex: Maria Silva" />
          </div>
          <div className="field">
            <label>E-mail (opcional)</label>
            <input className="input" type="email" value={form.email || ''} onChange={e => setForm({...form, email: e.target.value})} placeholder="maria@empresa.com" />
          </div>

          <div className="subform-label">Vínculo</div>
          <div className="field">
            <label>Cargo</label>
            {data.roles.length === 0 ? (
              <>
                <button className="btn btn-block" onClick={onNewRole}><Icon.Plus /> Cadastrar primeiro cargo</button>
                <div className="inline-help">Antes de cadastrar pessoas, crie ao menos um cargo.</div>
              </>
            ) : (
              <>
                <select className="select" value={form.roleId || ''} onChange={e => {
                  if (e.target.value === '__new__') { onNewRole(); return; }
                  setForm({...form, roleId: e.target.value || null});
                }}>
                  <option value="">— Sem cargo</option>
                  {data.roles
                    .slice()
                    .sort((a,b) => a.level - b.level || a.name.localeCompare(b.name))
                    .map(r => <option key={r.id} value={r.id}>{r.name} (N{r.level})</option>)}
                  <option value="__new__">— Cadastrar novo cargo…</option>
                </select>
                <div className="inline-help">Cargos são editados na aba <strong>Cargos</strong>. Alterações refletem em todos os ocupantes.</div>
              </>
            )}
          </div>

          <div className="field">
            <label>Reporta-se a</label>
            <select className="select" value={form.reportsTo || ''} onChange={e => setForm({...form, reportsTo: e.target.value || null})}>
              <option value="">— Nenhum / Diretoria</option>
              {candidates
                .slice()
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(c => <option key={c.id} value={c.id}>{c.name} {roleMap[c.roleId] ? '— ' + roleMap[c.roleId].name : ''}</option>)}
            </select>
            <div className="inline-help">Pessoas que reportam-se a este funcionário não aparecem na lista (evita loop).</div>
          </div>

          {!isNew && (
            <>
              <div className="subform-label">Impacto</div>
              <ul className="impact-list">
                <li>
                  <div className="av">{currentSup ? initials(currentSup.name) : '—'}</div>
                  <div className="grow">{currentSup ? <>Superior: <strong>{currentSup.name}</strong></> : 'Está na raiz (sem superior).'}</div>
                </li>
                <li>
                  <div className="av">{directReports.length || '—'}</div>
                  <div className="grow">
                    {directReports.length === 0
                      ? 'Ninguém se reporta a esta pessoa.'
                      : <><strong>{directReports.length}</strong> {directReports.length === 1 ? 'pessoa se reporta' : 'pessoas se reportam'} a esta pessoa.</>}
                  </div>
                </li>
              </ul>
              {directReports.length > 0 && (
                <div className="inline-warn">
                  <Icon.Info />
                  <div>Ao excluir, essas pessoas ficarão sem superior e virarão raízes na árvore. Reatribua depois.</div>
                </div>
              )}
            </>
          )}
        </div>

        <div className="drawer-foot">
          {isNew
            ? <span />
            : <button className="btn btn-danger" onClick={handleDelete}><Icon.Trash /> Excluir</button>}
          <div className="row" style={{gap:8}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
              {isNew ? 'Adicionar' : 'Salvar'}
            </button>
          </div>
        </div>
      </aside>
    </>
  );
}

function RoleDrawer({ data, role, isNew, onClose, onSave, onDelete, onNewDepartment }) {
  const init = role || { id: 'role_' + uid(), name: '', level: 2, departmentId: null, reportsToRoleId: null };
  const [form, setForm] = useState(init);

  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const holders = role ? data.employees.filter(e => e.roleId === role.id) : [];
  const canSave = form.name.trim().length > 0;
  const deptMap = Object.fromEntries((data.departments||[]).map(d => [d.id, d]));

  // Candidatos a "cargo superior": todos os outros cargos, exceto descendentes do cargo atual
  // (para evitar ciclos). Se for cargo novo, mostra todos.
  const supCandidates = useMemo(() => {
    if (isNew || !role) return data.roles.filter(r => r.id !== form.id);
    const descendants = new Set();
    const walk = (rid) => {
      data.roles.filter(r => r.reportsToRoleId === rid).forEach(r => {
        if (!descendants.has(r.id)) { descendants.add(r.id); walk(r.id); }
      });
    };
    walk(role.id);
    return data.roles.filter(r => r.id !== role.id && !descendants.has(r.id));
  }, [data.roles, role, isNew, form.id]);

  const subordinateRoles = role ? data.roles.filter(r => r.reportsToRoleId === role.id) : [];

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      ...form,
      name: form.name.trim(),
      level: Number(form.level),
      departmentId: form.departmentId || null,
      reportsToRoleId: form.reportsToRoleId || null,
    });
  };
  const handleDelete = () => {
    if (!role) return;
    const msgs = [];
    if (holders.length > 0) msgs.push(`${holders.length} pessoa(s) com este cargo ficará(ão) sem cargo`);
    if (subordinateRoles.length > 0) msgs.push(`${subordinateRoles.length} cargo(s) subordinado(s) ficará(ão) sem superior`);
    if (!confirm(`Excluir o cargo "${role.name}"?${msgs.length ? '\n\n' + msgs.join('.\n') + '.' : ''}`)) return;
    onDelete(role.id);
  };

  return (
    <>
      <div className="scrim" onClick={onClose}></div>
      <aside className="drawer" role="dialog">
        <div className="drawer-head">
          <div>
            <h3>{isNew ? 'Novo cargo' : 'Editar cargo'}</h3>
            <div className="drawer-sub">{isNew ? 'modelo reutilizável' : `id: ${role.id}`}</div>
          </div>
          <button className="close-btn" onClick={onClose}><Icon.Close /></button>
        </div>

        <div className="drawer-body">
          <div className="subform-label first">Definição</div>
          <div className="field">
            <label>Nome do cargo *</label>
            <input className="input" autoFocus value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Ex: Gerente de Loja" />
          </div>

          <div className="form-row">
            <div className="field">
              <label>Nível hierárquico</label>
              <select className="select" value={form.level} onChange={e => setForm({...form, level: Number(e.target.value)})}>
                <option value={0}>N0 — Diretoria</option>
                <option value={1}>N1 — Gerência</option>
                <option value={2}>N2 — Coordenação / Operação</option>
                <option value={3}>N3 — Operacional</option>
              </select>
            </div>
            <div className="field">
              <label>Departamento</label>
              {(data.departments||[]).length === 0 ? (
                <>
                  <button type="button" className="btn btn-block" onClick={onNewDepartment}><Icon.Plus /> Cadastrar primeiro departamento</button>
                  <div className="inline-help">Crie ao menos um departamento para atribuir este cargo.</div>
                </>
              ) : (
                <select className="select" value={form.departmentId || ''} onChange={e => {
                  if (e.target.value === '__new__') { onNewDepartment?.(); return; }
                  setForm({...form, departmentId: e.target.value || null});
                }}>
                  <option value="">— Sem departamento</option>
                  {(data.departments||[])
                    .slice()
                    .sort((a,b) => a.name.localeCompare(b.name))
                    .map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                  <option value="__new__">— Cadastrar novo departamento…</option>
                </select>
              )}
            </div>
          </div>

          <div className="subform-label">Hierarquia de cargos</div>
          <div className="field">
            <label>Reporta-se ao cargo</label>
            <select className="select" value={form.reportsToRoleId || ''} onChange={e => setForm({...form, reportsToRoleId: e.target.value || null})}>
              <option value="">— Nenhum (raiz / diretoria)</option>
              {supCandidates
                .slice()
                .sort((a,b) => a.level - b.level || a.name.localeCompare(b.name))
                .map(r => {
                  const dname = deptMap[r.departmentId]?.name;
                  return <option key={r.id} value={r.id}>{r.name} (N{r.level}{dname ? ' · ' + dname : ''})</option>;
                })}
            </select>
            <div className="inline-help">
              Define reporte direto entre cargos. Cargos descendentes deste são ocultados para evitar loops.
            </div>
          </div>

          {!isNew && subordinateRoles.length > 0 && (
            <>
              <div className="subform-label">Cargos subordinados</div>
              <ul className="impact-list">
                {subordinateRoles
                  .slice()
                  .sort((a,b) => a.level - b.level || a.name.localeCompare(b.name))
                  .map(r => {
                    const dn = deptMap[r.departmentId]?.name;
                    return (
                    <li key={r.id}>
                      <div className="av">N{r.level}</div>
                      <div className="grow"><strong>{r.name}</strong>{dn ? ` · ${dn}` : ''}</div>
                    </li>
                    );
                  })}
              </ul>
            </>
          )}

          {!isNew && holders.length > 0 && (
            <>
              <div className="subform-label">Ocupantes atuais</div>
              <div className="inline-help" style={{marginBottom:8}}>
                Alterações aqui refletem automaticamente nos cards abaixo.
              </div>
              <ul className="impact-list">
                {holders.map(h => (
                  <li key={h.id}>
                    <div className="av">{initials(h.name)}</div>
                    <div className="grow"><strong>{h.name}</strong></div>
                  </li>
                ))}
              </ul>
            </>
          )}

          {!isNew && holders.length === 0 && (
            <div className="inline-help" style={{marginTop:14}}>
              <Icon.Info /> Nenhuma pessoa está com este cargo no momento.
            </div>
          )}
        </div>

        <div className="drawer-foot">
          {isNew
            ? <span />
            : <button className="btn btn-danger" onClick={handleDelete}><Icon.Trash /> Excluir</button>}
          <div className="row" style={{gap:8}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
              {isNew ? 'Adicionar' : 'Salvar'}
            </button>
          </div>
        </div>
      </aside>
    </>
  );
}

function DepartmentsSidebar({ data, setEditing, search, setSearch }) {
  const departments = data.departments || [];
  const filtered = search.trim()
    ? departments.filter(d => d.name.toLowerCase().includes(search.toLowerCase()))
    : departments;
  const byId = Object.fromEntries(departments.map(d => [d.id, d]));
  const rolesCount = (id) => data.roles.filter(r => r.departmentId === id).length;
  const childrenCount = (id) => departments.filter(d => d.parentId === id).length;
  const parentName = (id) => id ? (byId[id]?.name || '—') : null;

  return (
    <aside className="sidebar">
      <div className="sb-head">
        <div>
          <h2>Departamentos</h2>
          <p>Áreas da empresa. Um cargo pertence a um departamento.</p>
        </div>
      </div>
      <div className="sb-body">
        <div className="field">
          <input className="input input-search" placeholder="Buscar departamento" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="section-label">
          <span>Lista ({filtered.length})</span>
          <span className="count-chip">{data.roles.length} cargos</span>
        </div>
        {filtered.length === 0 ? (
          <div className="empty" style={{padding:'28px 8px'}}>
            <div className="empty-icon"><Icon.Dept /></div>
            <h3>{departments.length === 0 ? 'Nenhum departamento' : 'Sem resultados'}</h3>
            <p>{departments.length === 0 ? 'Crie o primeiro para começar.' : 'Tente outra busca.'}</p>
          </div>
        ) : (
          <ul className="li-group">
            {filtered
              .slice()
              .sort((a,b) => a.name.localeCompare(b.name))
              .map(d => {
                const pname = parentName(d.parentId);
                const rc = rolesCount(d.id);
                const cc = childrenCount(d.id);
                return (
                  <li key={d.id} className="li-item" onClick={() => setEditing({ kind: 'department', id: d.id })}>
                    <div className="li-square"><Icon.Dept /></div>
                    <div className="li-body">
                      <div className="li-title">{d.name}</div>
                      <div className="li-sub">
                        {pname ? `sob: ${pname}` : 'raiz'}
                        {' · '}{rc} {rc === 1 ? 'cargo' : 'cargos'}
                        {cc > 0 ? ` · ${cc} ${cc === 1 ? 'sub-depto' : 'sub-deptos'}` : ''}
                      </div>
                    </div>
                    <span className="chev"><Icon.Chev /></span>
                  </li>
                );
              })}
          </ul>
        )}
      </div>
      <div className="sb-add">
        <button className="btn btn-primary btn-block" onClick={() => setEditing({ kind: 'department', isNew: true })}>
          <Icon.Plus /> Novo departamento
        </button>
      </div>
    </aside>
  );
}

function DepartmentDrawer({ data, department, isNew, onClose, onSave, onDelete }) {
  const init = department || { id: 'dep_' + uid(), name: '', parentId: null };
  const [form, setForm] = useState(init);

  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const departments = data.departments || [];
  const canSave = form.name.trim().length > 0;

  const parentCandidates = useMemo(() => {
    if (isNew || !department) return departments.filter(x => x.id !== form.id);
    const descendants = new Set();
    const walk = (did) => {
      departments.filter(x => x.parentId === did).forEach(x => {
        if (!descendants.has(x.id)) { descendants.add(x.id); walk(x.id); }
      });
    };
    walk(department.id);
    return departments.filter(x => x.id !== department.id && !descendants.has(x.id));
  }, [departments, department, isNew, form.id]);

  const childDepts = department ? departments.filter(x => x.parentId === department.id) : [];
  const rolesHere = department ? data.roles.filter(r => r.departmentId === department.id) : [];

  const handleSave = () => {
    if (!canSave) return;
    onSave({ ...form, name: form.name.trim(), parentId: form.parentId || null });
  };
  const handleDelete = () => {
    if (!department) return;
    const msgs = [];
    if (rolesHere.length > 0) msgs.push(`${rolesHere.length} cargo(s) ficará(ão) sem departamento`);
    if (childDepts.length > 0) msgs.push(`${childDepts.length} sub-departamento(s) ficará(ão) na raiz`);
    if (!confirm(`Excluir o departamento "${department.name}"?${msgs.length ? '\n\n' + msgs.join('.\n') + '.' : ''}`)) return;
    onDelete(department.id);
  };

  return (
    <>
      <div className="scrim" onClick={onClose}></div>
      <aside className="drawer" role="dialog">
        <div className="drawer-head">
          <div>
            <h3>{isNew ? 'Novo departamento' : 'Editar departamento'}</h3>
            <div className="drawer-sub">{isNew ? 'área da empresa' : `id: ${department.id}`}</div>
          </div>
          <button className="close-btn" onClick={onClose}><Icon.Close /></button>
        </div>

        <div className="drawer-body">
          <div className="subform-label first">Definição</div>
          <div className="field">
            <label>Nome do departamento *</label>
            <input className="input" autoFocus value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Ex: Operações, Caixa, Corte" />
          </div>

          <div className="field">
            <label>Departamento pai</label>
            <select className="select" value={form.parentId || ''} onChange={e => setForm({...form, parentId: e.target.value || null})}>
              <option value="">— Nenhum (raiz / diretoria)</option>
              {parentCandidates
                .slice()
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(x => <option key={x.id} value={x.id}>{x.name}</option>)}
            </select>
            <div className="inline-help">
              Define a hierarquia na <strong>Visão A · Cargos</strong>. Sub-departamentos deste são ocultados para evitar loops.
            </div>
          </div>

          {!isNew && childDepts.length > 0 && (
            <>
              <div className="subform-label">Sub-departamentos</div>
              <ul className="impact-list">
                {childDepts
                  .slice()
                  .sort((a,b) => a.name.localeCompare(b.name))
                  .map(x => (
                  <li key={x.id}>
                    <div className="av"><Icon.Dept /></div>
                    <div className="grow"><strong>{x.name}</strong></div>
                  </li>
                ))}
              </ul>
            </>
          )}

          {!isNew && rolesHere.length > 0 && (
            <>
              <div className="subform-label">Cargos deste departamento</div>
              <ul className="impact-list">
                {rolesHere
                  .slice()
                  .sort((a,b) => a.level - b.level || a.name.localeCompare(b.name))
                  .map(r => (
                  <li key={r.id}>
                    <div className="av">N{r.level}</div>
                    <div className="grow"><strong>{r.name}</strong></div>
                  </li>
                ))}
              </ul>
            </>
          )}

          {!isNew && childDepts.length === 0 && rolesHere.length === 0 && (
            <div className="inline-help" style={{marginTop:14}}>
              <Icon.Info /> Departamento vazio. Adicione cargos apontando para ele na aba <strong>Cargos</strong>.
            </div>
          )}
        </div>

        <div className="drawer-foot">
          {isNew
            ? <span />
            : <button className="btn btn-danger" onClick={handleDelete}><Icon.Trash /> Excluir</button>}
          <div className="row" style={{gap:8}}>
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
              {isNew ? 'Adicionar' : 'Salvar'}
            </button>
          </div>
        </div>
      </aside>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
