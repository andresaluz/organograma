<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Organograma — Gerador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ee; --surface: #fffdfa; --surface-2: #ece7df; --surface-3: #e4ddd1;
    --ink: #1f1a16; --ink-soft: #58504a; --ink-mute: #8a8078;
    --line: #e2dcd2; --line-strong: #cfc7ba;
    --accent: #7a1f1f; --accent-soft: #a83a3a; --accent-wash: #f2e4e0;
    --ok: #4a6b3a; --warn: #a8762a; --danger: #a83a3a;
    --radius: 10px; --radius-sm: 6px;
    --shadow-sm: 0 1px 2px rgba(30,20,15,.04), 0 0 0 1px var(--line);
    --shadow-md: 0 6px 20px -8px rgba(30,20,15,.12), 0 0 0 1px var(--line);
    --shadow-lg: 0 30px 60px -20px rgba(30,20,15,.25), 0 0 0 1px var(--line);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--surface);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--ink); color: var(--bg);
    display: grid; place-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700; font-size: 13px;
  }
  .brand-text { line-height: 1.15; }
  .brand-text .t1 { font-weight: 600; font-size: 14px; }
  .brand-text .t2 { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.02em;}
  .topbar-center { font-size: 13px; }
  .co-pill {
    padding: 5px 11px; background: var(--surface-2);
    border-radius: 20px; font-weight: 500;
  }
  .co-pill .mute { color: var(--ink-mute); font-weight: 400; margin-right: 4px; font-size: 11.5px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .save-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-mute);
    font-family: 'IBM Plex Mono', monospace;
  }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--line-strong);
    background: var(--surface); color: var(--ink);
    cursor: pointer; transition: all .15s ease;
  }
  .btn:hover { background: var(--surface-2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  a.btn { text-decoration: none; color: var(--ink); }
  a.btn:hover { color: var(--ink); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { background: #000; }
  .btn-accent { background: var(--accent); color: #fdf7f5; border-color: var(--accent); }
  .btn-accent:hover { background: #5c1414; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--ink); }
  .btn-danger { background: transparent; color: var(--danger); border-color: transparent; }
  .btn-danger:hover { background: var(--accent-wash); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-block { width: 100%; justify-content: center; }

  .app {
    display: grid;
    grid-template-columns: 72px 420px 1fr;
    min-height: calc(100vh - 57px);
  }

  nav.rail {
    background: var(--surface); border-right: 1px solid var(--line);
    padding: 16px 0;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .rail-btn {
    width: 48px; height: 48px;
    border-radius: 8px; border: none;
    background: transparent; color: var(--ink-mute);
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.04em;
    transition: all .15s ease; position: relative;
  }
  .rail-btn svg { width: 20px; height: 20px; stroke-width: 1.6; }
  .rail-btn:hover { background: var(--surface-2); color: var(--ink); }
  .rail-btn.active { background: var(--ink); color: var(--bg); }
  .rail-btn.active::before {
    content: ''; position: absolute; left: -16px; top: 12px; bottom: 12px;
    width: 3px; background: var(--accent); border-radius: 2px;
  }
  .rail-spacer { flex: 1; }

  aside.sidebar {
    background: var(--surface); border-right: 1px solid var(--line);
    overflow: hidden; max-height: calc(100vh - 57px);
    display: flex; flex-direction: column;
  }
  .sb-head {
    padding: 22px 24px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .sb-head h2 { margin: 0 0 3px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .sb-head p { margin: 0; font-size: 12.5px; color: var(--ink-mute); }
  .sb-body { padding: 18px 24px 24px; flex: 1; overflow-y: auto; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    margin-bottom: 6px; color: var(--ink-soft);
  }
  .input, .select, .textarea {
    width: 100%; padding: 9px 11px;
    border-radius: var(--radius-sm); border: 1px solid var(--line-strong);
    background: var(--surface);
    font-family: inherit; font-size: 13.5px; color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-wash);
  }
  .select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%238a8078' stroke-width='1.5' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 11px center;
    padding-right: 30px;
  }
  .input-search {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238a8078' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 10px center;
    padding-left: 32px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .li-group { list-style: none; margin: 0; padding: 0; }
  .li-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px;
    border: 1px solid var(--line); background: var(--surface);
    border-radius: var(--radius-sm); margin-bottom: 6px;
    cursor: pointer; transition: background .15s ease, border-color .15s ease;
  }
  .li-item:hover { background: var(--surface-2); }
  .li-item.active {
    border-color: var(--ink); background: var(--surface-2);
    box-shadow: 0 0 0 3px var(--surface-3);
  }
  .li-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface-2);
    display: grid; place-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600; color: var(--ink-soft);
    flex-shrink: 0;
  }
  .li-square {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--surface-2);
    display: grid; place-items: center; flex-shrink: 0; color: var(--ink-soft);
  }
  .li-square svg { width: 16px; height: 16px; }
  .li-body { flex: 1; min-width: 0; }
  .li-title {
    font-size: 13.5px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .li-sub {
    font-size: 11.5px; color: var(--ink-mute);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }
  .li-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .chev { color: var(--ink-mute); }
  .chev svg { width: 14px; height: 14px; }

  .level-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    padding: 2px 6px; border-radius: 3px;
    background: var(--surface-2); color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .level-chip.l0 { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .level-chip.l1 { background: var(--accent-wash); color: var(--accent); border-color: #e8cfc8; }
  .level-chip.l2 { background: #f1ead9; color: #7a5a15; border-color: #e8dfc4; }
  .level-chip.l3 { background: var(--surface-2); color: var(--ink-soft); }

  .count-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; padding: 2px 7px; border-radius: 20px;
    background: var(--surface-2); color: var(--ink-soft);
  }

  main.canvas {
    padding: 28px 32px;
    overflow: auto; max-height: calc(100vh - 57px);
    background: radial-gradient(circle, var(--line-strong) 1px, transparent 1.2px);
    background-size: 22px 22px;
  }
  .canvas-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 22px;
  }
  .canvas-title h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .canvas-title .sub {
    font-size: 12.5px; color: var(--ink-mute); font-family: 'IBM Plex Mono', monospace;
  }
  .canvas-tools { display: flex; gap: 8px; }
  .zoom {
    display: inline-flex; align-items: center;
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm); overflow: hidden;
  }
  .zoom button {
    width: 32px; height: 34px; border: none; background: transparent;
    cursor: pointer; color: var(--ink-soft); font-size: 15px;
    display: grid; place-items: center;
  }
  .zoom button:hover { background: var(--surface-2); color: var(--ink); }
  .zoom .zoom-val {
    padding: 0 10px; font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px; color: var(--ink-soft);
    border-left: 1px solid var(--line); border-right: 1px solid var(--line);
    height: 34px; display: grid; place-items: center; min-width: 52px;
  }

  /* ============ SEGMENTED CONTROL — toggle com estado ativo bem visível ============ */
  .seg {
    display: inline-flex; align-items: stretch;
    background: var(--surface-2);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }
  .seg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute);
    padding: 0 10px 0 8px;
    display: flex; align-items: center;
    border-right: 1px solid var(--line-strong);
    margin-right: 3px;
  }
  .seg-btn {
    border: none; background: transparent; cursor: pointer;
    padding: 7px 14px; border-radius: 4px;
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--ink-soft);
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .12s ease;
    white-space: nowrap;
  }
  .seg-btn:hover:not(.active) {
    background: var(--surface);
    color: var(--ink);
  }
  .seg-btn.active {
    background: var(--ink);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(30,20,15,.18), 0 0 0 1px var(--ink);
  }
  .seg-btn .seg-ico {
    font-size: 14px; line-height: 1;
    font-family: 'IBM Plex Sans', sans-serif;
    display: inline-block; min-width: 12px; text-align: center;
  }
  .seg-btn.active .seg-ico { color: #fff; }
  /* variante accent — usar vermelho da marca para o toggle de visão */
  .seg.seg-accent .seg-btn.active {
    background: var(--accent);
    box-shadow: 0 1px 2px rgba(122,31,31,.25), 0 0 0 1px var(--accent);
  }

  /* toggle simples (compacto) com ícone de caixa */
  .btn-toggle {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 13px; border-radius: var(--radius-sm);
    font-size: 12.5px; font-weight: 500;
    border: 1px solid var(--line-strong);
    background: var(--surface); color: var(--ink-soft);
    cursor: pointer; transition: all .12s ease;
  }
  .btn-toggle:hover { background: var(--surface-2); color: var(--ink); }
  .btn-toggle.on {
    background: var(--ink); color: #fff; border-color: var(--ink);
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(30,20,15,.18);
  }
  .btn-toggle svg { width: 14px; height: 14px; }

  /* checkbox estilizado para a opção de paginação de PDF */
  .check-pill {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px; color: var(--ink-soft);
    transition: all .12s ease;
    user-select: none;
  }
  .check-pill:hover { background: var(--surface-2); color: var(--ink); }
  .check-pill.on {
    background: #eef3e8; border-color: #b7c9a2; color: #3d5a28;
  }
  .check-pill input { display: none; }
  .check-pill .check-box {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1.5px solid var(--line-strong);
    background: var(--surface);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all .12s ease;
  }
  .check-pill.on .check-box {
    background: var(--ok); border-color: var(--ok);
  }
  .check-pill.on .check-box::after {
    content: ''; width: 9px; height: 5px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg); margin-top: -2px;
  }

  .chart-wrap {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 28px 48px;
    box-shadow: var(--shadow-sm);
    min-height: 520px; overflow: auto;
  }
  .chart-zoom { transform-origin: top center; transition: transform .2s ease; }
  .chart-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-mute);
    margin-bottom: 32px; padding-bottom: 14px;
    border-bottom: 1px dashed var(--line-strong);
  }
  .chart-meta .co-name {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em;
  }

  .tree { display: flex; justify-content: center; }
  .tree ul {
    padding-top: 24px; position: relative;
    list-style: none; display: flex; justify-content: center; margin: 0;
  }
  .tree li {
    position: relative; padding: 24px 12px 0 12px; text-align: center;
  }
  /* compact mode — reduz espaços para caber mais em PDF */
  .tree.compact ul { padding-top: 16px; }
  .tree.compact li { padding: 16px 7px 0 7px; }
  .tree.compact li::before, .tree.compact li::after,
  .tree.compact ul ul::before { height: 16px; }
  .tree.compact .node { min-width: 170px; max-width: 200px; padding: 9px 11px; }
  .tree.compact .node-foot { margin-top: 7px; padding-top: 6px; }

  /* orientação L→R — converte árvore vertical em horizontal */
  .tree.lr { display: block; }
  .tree.lr ul {
    display: flex; flex-direction: column; align-items: flex-start;
    padding-top: 0; padding-left: 36px;
  }
  .tree.lr.compact ul { padding-left: 24px; }
  .tree.lr li { padding: 6px 0 6px 36px; text-align: left; }
  .tree.lr.compact li { padding: 4px 0 4px 24px; }
  .tree.lr li::before, .tree.lr li::after { top: 0; width: 36px; height: 50%; border-top: 0; }
  .tree.lr.compact li::before, .tree.lr.compact li::after { width: 24px; }
  .tree.lr li::before { left: 0; right: auto; border-left: 1.5px solid var(--line-strong); border-top: 1.5px solid var(--line-strong); }
  .tree.lr li::after  { left: 0; top: 50%; border-left: 1.5px solid var(--line-strong); }
  .tree.lr li:last-child::after { display: none; }
  .tree.lr li:first-child::before { border-radius: 0; }
  .tree.lr ul ul::before { display: none; }
  .tree li::before, .tree li::after {
    content: ''; position: absolute; top: 0;
    height: 24px; border-top: 1.5px solid var(--line-strong); width: 50%;
  }
  .tree li::before { right: 50%; }
  .tree li::after  { left: 50%; border-left: 1.5px solid var(--line-strong); }
  .tree li:only-child::before, .tree li:only-child::after { display: none; }
  .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
  .tree li:last-child::before { border-right: 1.5px solid var(--line-strong); border-radius: 0 6px 0 0; }
  .tree li:first-child::after { border-radius: 6px 0 0 0; }
  .tree ul ul::before {
    content: ''; position: absolute; top: 0; left: 50%;
    border-left: 1.5px solid var(--line-strong); height: 24px;
  }

  .node {
    display: inline-block; text-align: left;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    padding: 12px 14px;
    min-width: 200px; max-width: 220px;
    box-shadow: var(--shadow-sm); position: relative;
    transition: all .15s ease; cursor: pointer;
  }
  .node:hover {
    border-color: var(--ink-soft);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .node .role-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-mute); margin-bottom: 6px;
  }
  .node-head { display: flex; align-items: center; gap: 10px; }
  .node-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface-2);
    display: grid; place-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600; color: var(--ink-soft);
    flex-shrink: 0;
  }
  .node-head-text { min-width: 0; }
  .node .node-name { font-size: 14px; font-weight: 600; letter-spacing: -0.005em; line-height: 1.2; }
  .node .node-role { font-size: 11.5px; color: var(--ink-soft); line-height: 1.3; margin-top: 1px; }
  .node .node-foot {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px dashed var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--ink-mute);
  }
  .node .rep-count {
    background: var(--surface-2); padding: 2px 6px; border-radius: 20px; color: var(--ink-soft);
  }
  .node.root {
    background: var(--ink); border-color: var(--ink); color: var(--bg);
    min-width: 210px;
  }
  .node.root .role-tag { color: rgba(255,255,255,.55); }
  .node.root .node-name { color: #fff; }
  .node.root .node-role { color: rgba(255,255,255,.72); }
  .node.root .node-foot { border-top-color: rgba(255,255,255,.2); color: rgba(255,255,255,.55); }
  .node.root .rep-count { background: rgba(255,255,255,.12); color: rgba(255,255,255,.85); }
  .node.root .node-avatar { background: rgba(255,255,255,.15); color: #fff; }
  .node.l1 .role-tag { color: var(--accent); }
  .node.selected {
    border-color: var(--accent-soft) !important;
    box-shadow: 0 0 0 3px var(--accent-wash), var(--shadow-sm) !important;
  }
  /* Visão A — nó sem ocupantes (vaga em aberto) */
  .node.vacant {
    border-style: dashed;
    border-color: #cfc7ba;
    background: repeating-linear-gradient(
      45deg,
      var(--surface),
      var(--surface) 8px,
      #fbf8f1 8px,
      #fbf8f1 16px
    );
  }
  .node.vacant.root { background: var(--ink); border-style: solid; }
  .vacant-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;
    color: #7a5a15; background: #fbf3e2; border: 1px solid #ecdfc1;
    padding: 1px 7px; border-radius: 10px;
  }
  .node.root .vacant-tag { color: #fbf3e2; background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); }

  /* Visão A — card de departamento com cargos embutidos */
  .node.dept-node {
    min-width: 260px; max-width: 300px;
    text-align: left;
    padding: 12px 14px 10px;
  }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ============ ICONS ============
const Icon = {
  Company: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg>,
  Role: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 4v16"/></svg>,
  People: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Org: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="5" rx="1"/><rect x="2" y="17" width="6" height="5" rx="1"/><rect x="16" y="17" width="6" height="5" rx="1"/><path d="M12 7v4M5 17v-2a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2"/></svg>,
  Data: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  Dept: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 21V11h8v10"/><path d="M3 7l9-4 9 4"/></svg>,
  Plus: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Close: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Trash: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>,

  Fit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4"/></svg>,
  Info: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  Download: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  Upload: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  Help: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
};

// ============ UTILS ============
const uid = () => Math.random().toString(36).slice(2, 10);
const initials = (name) => {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
};
const LEVEL_NAMES = ['Diretoria', 'Gerência', 'Coordenação', 'Operação'];
const levelClass = (l) => `l${Math.min(3, Math.max(0, l))}`;

const DEFAULT_DATA = {
  company: { name: 'Minha Empresa', updated: new Date().toISOString() },
  departments: [
    { id: 'dep_dir', name: 'Diretoria', parentId: null },
    { id: 'dep_loja', name: 'Loja', parentId: 'dep_dir' },
  ],
  roles: [
    { id: 'role_dir', name: 'Diretor(a)', level: 0, departmentId: 'dep_dir', reportsToRoleId: null },
    { id: 'role_ger', name: 'Gerente', level: 1, departmentId: 'dep_loja', reportsToRoleId: 'role_dir' },
    { id: 'role_acg', name: 'Açougueiro', level: 2, departmentId: 'dep_loja', reportsToRoleId: 'role_ger' },
  ],
  employees: [
    { id: 'e1', name: 'Roberto Exemplo', roleId: 'role_dir', email: '', reportsTo: null },
    { id: 'e2', name: 'Juliana Exemplo', roleId: 'role_ger', email: '', reportsTo: 'e1' },
  ]
};

const STORAGE_KEY = 'orgchart-v1';

const normDept = (s) => (s||'').trim().toLowerCase();

const migrateData = (d) => {
  if (!d?.roles || !d?.employees) return d;
  let out = { ...d };

  if (!Array.isArray(out.departments)) {
    const seen = {};
    const departments = [];
    out.roles.forEach(r => {
      const name = (r.department || '').trim();
      if (!name) return;
      const key = normDept(name);
      if (!seen[key]) {
        const id = 'dep_' + uid();
        seen[key] = id;
        departments.push({ id, name, parentId: null });
      }
    });
    out = {
      ...out,
      departments,
      roles: out.roles.map(r => {
        const key = normDept(r.department);
        const { department, ...rest } = r;
        return { ...rest, departmentId: key ? seen[key] : null };
      })
    };
  }

  const needsReports = out.roles.some(r => r.reportsToRoleId === undefined);
  if (needsReports) {
    const empById = Object.fromEntries(out.employees.map(e => [e.id, e]));
    out.roles = out.roles.map(r => {
      if (r.reportsToRoleId !== undefined) return r;
      const tally = {};
      out.employees
        .filter(e => e.roleId === r.id && e.reportsTo)
        .forEach(e => {
          const sup = empById[e.reportsTo];
          if (sup && sup.roleId && sup.roleId !== r.id) {
            tally[sup.roleId] = (tally[sup.roleId] || 0) + 1;
          }
        });
      const inferred = Object.keys(tally).sort((a,b) => tally[b] - tally[a])[0] || null;
      return { ...r, reportsToRoleId: inferred };
    });
  }

  return out;
};

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return DEFAULT_DATA;
    const parsed = JSON.parse(raw);
    if (!parsed.company || !Array.isArray(parsed.roles) || !Array.isArray(parsed.employees)) return DEFAULT_DATA;
    return migrateData(parsed);
  } catch {
    return DEFAULT_DATA;
  }
};

// ============ APP ============
function App() {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('people'); // 'company' | 'roles' | 'people' | 'org' | 'data'
  const [editing, setEditing] = useState(null); // { kind: 'role'|'employee'|'company', id?: string, isNew?: boolean }
  const [toast, setToast] = useState(null);
  const [zoom, setZoom] = useState(100);
  const [search, setSearch] = useState('');
  const [savedAt, setSavedAt] = useState(Date.now());
  const chartRef = useRef(null);
  const [viewMode, setViewMode] = useState('operational'); // 'departments' | 'roles' | 'operational'
  const [orientation, setOrientation] = useState('tb'); // 'tb' | 'lr'
  const [compact, setCompact] = useState(false);
  const [pdfPaginate, setPdfPaginate] = useState(true);

  // Persist
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setSavedAt(Date.now());
    } catch (e) {}
  }, [data]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  // CRUD helpers
  const saveRole = (role) => {
    setData(d => {
      const exists = d.roles.some(r => r.id === role.id);
      return {
        ...d,
        roles: exists ? d.roles.map(r => r.id === role.id ? role : r) : [...d.roles, role]
      };
    });
  };
  const deleteRole = (id) => {
    setData(d => ({
      ...d,
      roles: d.roles
        .filter(r => r.id !== id)
        .map(r => r.reportsToRoleId === id ? { ...r, reportsToRoleId: null } : r),
      employees: d.employees.map(e => e.roleId === id ? { ...e, roleId: null } : e)
    }));
  };
  const saveDepartment = (dep) => {
    setData(d => {
      const list = d.departments || [];
      const exists = list.some(x => x.id === dep.id);
      return {
        ...d,
        departments: exists ? list.map(x => x.id === dep.id ? dep : x) : [...list, dep]
      };
    });
  };
  const deleteDepartment = (id) => {
    setData(d => {
      const list = d.departments || [];
      return {
        ...d,
        departments: list
          .filter(x => x.id !== id)
          .map(x => x.parentId === id ? { ...x, parentId: null } : x),
        roles: d.roles.map(r => r.departmentId === id ? { ...r, departmentId: null } : r)
      };
    });
  };
  const saveEmployee = (emp) => {
    setData(d => {
      const exists = d.employees.some(e => e.id === emp.id);
      return {
        ...d,
        employees: exists ? d.employees.map(e => e.id === emp.id ? emp : e) : [...d.employees, emp]
      };
    });
  };
  const deleteEmployee = (id) => {
    setData(d => ({
      ...d,
      employees: d.employees
        .filter(e => e.id !== id)
        .map(e => e.reportsTo === id ? { ...e, reportsTo: null } : e)
    }));
  };
  const saveCompany = (co) => {
    setData(d => ({ ...d, company: { ...d.company, ...co, updated: new Date().toISOString() } }));
  };

  // Tree build — funcionários (Visão B — Operacional)
  const treeEmployees = useMemo(() => {
    const roleMap = Object.fromEntries(data.roles.map(r => [r.id, r]));
    const empMap = Object.fromEntries(data.employees.map(e => [e.id, { ...e, role: roleMap[e.roleId], children: [] }]));
    const roots = [];
    Object.values(empMap).forEach(e => {
      if (e.reportsTo && empMap[e.reportsTo]) {
        empMap[e.reportsTo].children.push(e);
      } else {
        roots.push(e);
      }
    });
    return roots;
  }, [data]);

  // Tree build — departamentos (Visão A — Estrutura).
  // Árvore limpa de áreas, sem cargos embutidos. Cada card mostra contadores.
  const treeDepts = useMemo(() => {
    const departments = data.departments || [];

    const rolesByDept = {};
    data.roles.forEach(r => {
      const key = r.departmentId || '__none__';
      (rolesByDept[key] = rolesByDept[key] || []).push(r);
    });
    const emplByDept = {};
    data.employees.forEach(e => {
      const r = data.roles.find(x => x.id === e.roleId);
      const key = r?.departmentId || '__none__';
      (emplByDept[key] = emplByDept[key] || []).push(e);
    });

    const nodeMap = {};
    departments.forEach(dep => {
      nodeMap[dep.id] = {
        id: dep.id,
        name: dep.name,
        department: dep,
        roleCount: (rolesByDept[dep.id] || []).length,
        peopleCount: (emplByDept[dep.id] || []).length,
        children: [],
        _kind: 'department',
      };
    });
    if (rolesByDept['__none__'] || emplByDept['__none__']) {
      nodeMap['__none__'] = {
        id: '__none__',
        name: 'Sem departamento',
        department: null,
        roleCount: (rolesByDept['__none__'] || []).length,
        peopleCount: (emplByDept['__none__'] || []).length,
        children: [],
        _kind: 'department',
        _virtual: true,
      };
    }

    const safeParent = (depId) => {
      let cur = depId;
      const seen = new Set();
      while (cur) {
        if (seen.has(cur)) return null;
        seen.add(cur);
        const n = nodeMap[cur];
        if (!n || !n.department) return null;
        cur = n.department.parentId;
      }
      return depId;
    };

    const roots = [];
    departments.forEach(dep => {
      const n = nodeMap[dep.id];
      const sup = dep.parentId;
      if (sup && nodeMap[sup] && safeParent(sup) === sup && sup !== dep.id) {
        nodeMap[sup].children.push(n);
      } else {
        roots.push(n);
      }
    });
    if (nodeMap['__none__']) roots.push(nodeMap['__none__']);
    return roots;
  }, [data]);

  // Tree build — cargos (Visão B — Cargos).
  // Árvore de cargos via reportsToRoleId. Cada cargo aparece uma vez.
  const treeRoles = useMemo(() => {
    const holders = {};
    data.employees.forEach(e => {
      if (!e.roleId) return;
      (holders[e.roleId] = holders[e.roleId] || []).push(e);
    });
    const deptMap = Object.fromEntries((data.departments||[]).map(d => [d.id, d]));

    const nodeMap = Object.fromEntries(
      data.roles.map(r => [r.id, {
        id: r.id,
        name: r.name,
        role: r,
        department: deptMap[r.departmentId] || null,
        level: r.level,
        holders: holders[r.id] || [],
        children: [],
        _kind: 'role',
      }])
    );

    const safeParent = (roleId) => {
      let cur = roleId;
      const seen = new Set();
      while (cur) {
        if (seen.has(cur)) return null;
        seen.add(cur);
        const n = nodeMap[cur];
        if (!n) return null;
        cur = n.role.reportsToRoleId;
      }
      return roleId;
    };

    const roots = [];
    Object.values(nodeMap).forEach(n => {
      const sup = n.role.reportsToRoleId;
      if (sup && nodeMap[sup] && safeParent(sup) === sup && sup !== n.id) {
        nodeMap[sup].children.push(n);
      } else {
        roots.push(n);
      }
    });
    return roots;
  }, [data]);

  const tree = viewMode === 'departments' ? treeDepts
             : viewMode === 'roles' ? treeRoles
             : treeEmployees;

  const levelsCount = useMemo(() => {
    let max = 0;
    const walk = (n, depth) => {
      max = Math.max(max, depth);
      n.children.forEach(c => walk(c, depth + 1));
    };
    tree.forEach(r => walk(r, 0));
    return max + 1;
  }, [tree]);

  const onExportPdf = useCallback(async () => {
    if (!chartRef.current) return;
    const el = chartRef.current;
    const prevTransform = el.style.transform;
    el.style.transform = 'none';
    const safeName = (data.company.name||'empresa').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
    const suffix = viewMode === 'departments' ? 'estrutura'
                 : viewMode === 'roles' ? 'cargos'
                 : 'operacional';
    showToast('Gerando PDF…');

    try {
      const opt = {
        margin: [8, 8, 8, 8],
        filename: `organograma-${safeName}-${suffix}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#fffdfa', useCORS: true, windowWidth: el.scrollWidth },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
        pagebreak: pdfPaginate ? { mode: ['css','legacy'], before: '.pdf-section.break' } : { mode: [] }
      };
      await html2pdf().set(opt).from(el).save();
      showToast('PDF gerado');
    } catch (e) {
      console.error(e);
      showToast('Erro ao gerar PDF');
    } finally {
      el.style.transform = prevTransform;
    }
  }, [data.company.name, viewMode, pdfPaginate, tree.length]);

  const onExportJson = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `organograma-${(data.company.name||'empresa').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Dados exportados');
  };
  const onImportJson = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!parsed.company || !Array.isArray(parsed.roles) || !Array.isArray(parsed.employees)) {
          showToast('Arquivo inválido');
          return;
        }
        setData(parsed);
        showToast('Dados importados');
      } catch {
        showToast('Arquivo inválido');
      }
    };
    reader.readAsText(file);
  };
  const onClearAll = () => {
    if (!confirm('Apagar todos os dados e recomeçar? Esta ação não pode ser desfeita.')) return;
    localStorage.removeItem(STORAGE_KEY);
    setData({ company: { name: 'Minha Empresa', updated: new Date().toISOString() }, roles: [], employees: [] });
    setEditing(null);
    showToast('Dados apagados');
  };

  const savedText = useMemo(() => {
    const diff = Math.max(0, Math.floor((Date.now() - savedAt)/1000));
    if (diff < 5) return 'salvo agora';
    if (diff < 60) return `salvo há ${diff}s`;
    if (diff < 3600) return `salvo há ${Math.floor(diff/60)}min`;
    return 'salvo';
  }, [savedAt]);

  return (
    <>
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">O</div>
          <div className="brand-text">
            <div className="t1">Organograma</div>
            <div className="t2">Gerador de estrutura</div>
          </div>
        </div>
        <div className="topbar-center">
          <div className="co-pill"><span className="mute">empresa</span>{data.company.name}</div>
        </div>
        <div className="topbar-right">
          <div className="save-indicator">
            <span className="save-dot"></span>
            <span>{savedText} · localStorage</span>
          </div>
          <a className="btn" href="manual.html" target="_blank" rel="noopener" title="Abrir manual em nova aba">
            <Icon.Help /> Manual
          </a>
          <button className="btn btn-accent" onClick={onExportPdf} disabled={data.employees.length === 0}>
            <Icon.Pdf /> Gerar PDF
          </button>
        </div>
      </header>

      <div className="app">
        <nav className="rail">
          {[
            ['company', 'EMPRESA', Icon.Company],
            ['departments', 'DEPTO', Icon.Dept],
            ['roles', 'CARGOS', Icon.Role],
            ['people', 'PESSOAS', Icon.People],
            ['org', 'ORG', Icon.Org],
            ['data', 'DADOS', Icon.Data],
          ].map(([key, label, Ic], i) => (
            <React.Fragment key={key}>
              {key === 'data' && <div className="rail-spacer" />}
              <button
                className={`rail-btn ${tab === key ? 'active' : ''}`}
                onClick={() => setTab(key)}
                title={label}>
                <Ic /> {label}
              </button>
            </React.Fragment>
          ))}
        </nav>

        {tab === 'company' && <CompanySidebar data={data} save={saveCompany} />}
        {tab === 'departments' && <DepartmentsSidebar data={data} setEditing={setEditing} search={search} setSearch={setSearch} />}
        {tab === 'roles' && <RolesSidebar data={data} setEditing={setEditing} search={search} setSearch={setSearch} />}
        {tab === 'people' && <PeopleSidebar data={data} setEditing={setEditing} search={search} setSearch={setSearch} />}
        {tab === 'org' && <OrgSidebar data={data} tree={treeEmployees} setEditing={setEditing} />}
        {tab === 'data' && <DataSidebar onExportJson={onExportJson} onImportJson={onImportJson} onClearAll={onClearAll} data={data} />}

        <Canvas
          data={data}
          tree={tree}
          levelsCount={levelsCount}
          zoom={zoom} setZoom={setZoom}
          chartRef={chartRef}
          viewMode={viewMode} setViewMode={setViewMode}
          orientation={orientation} setOrientation={setOrientation}
          compact={compact} setCompact={setCompact}
          pdfPaginate={pdfPaginate} setPdfPaginate={setPdfPaginate}
          selectedId={
            viewMode === 'departments'
              ? (editing?.kind === 'department' ? editing.id : null)
              : viewMode === 'roles'
                ? (editing?.kind === 'role' ? editing.id : null)
                : (editing?.kind === 'employee' ? editing.id : null)
          }
          onNodeClick={(id) => {
            if (viewMode === 'departments') {
              if (id && id !== '__none__') setEditing({ kind: 'department', id });
            } else if (viewMode === 'roles') {
              setEditing({ kind: 'role', id });
            } else {
              setEditing({ kind: 'employee', id });
            }
          }}
          onAddFirst={() => setEditing({ kind: 'employee', isNew: true })}
        />
      </div>

      {editing?.kind === 'employee' && (
        <EmployeeDrawer
          key={editing.id || 'new'}
          data={data}
          employee={data.employees.find(e => e.id === editing.id)}
          isNew={editing.isNew}
          onClose={() => setEditing(null)}
          onSave={(emp) => { saveEmployee(emp); setEditing(null); showToast(editing.isNew ? 'Funcionário adicionado' : 'Alterações salvas'); }}
          onDelete={(id) => { deleteEmployee(id); setEditing(null); showToast('Funcionário excluído'); }}
          onNewRole={() => setEditing({ kind: 'role', isNew: true })}
        />
      )}

      {editing?.kind === 'role' && (
        <RoleDrawer
          key={editing.id || 'new'}
          data={data}
          role={data.roles.find(r => r.id === editing.id)}
          isNew={editing.isNew}
          onClose={() => setEditing(null)}
          onSave={(r) => { saveRole(r); setEditing(null); showToast(editing.isNew ? 'Cargo adicionado' : 'Cargo atualizado'); }}
          onDelete={(id) => { deleteRole(id); setEditing(null); showToast('Cargo excluído'); }}
          onNewDepartment={() => setEditing({ kind: 'department', isNew: true })}
        />
      )}

      {editing?.kind === 'department' && (
        <DepartmentDrawer
          key={editing.id || 'new'}
          data={data}
          department={(data.departments||[]).find(x => x.id === editing.id)}
          isNew={editing.isNew}
          onClose={() => setEditing(null)}
          onSave={(dep) => { saveDepartment(dep); setEditing(null); showToast(editing.isNew ? 'Departamento adicionado' : 'Departamento atualizado'); }}
          onDelete={(id) => { deleteDepartment(id); setEditing(null); showToast('Departamento excluído'); }}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function RolesSidebar({ data, setEditing, search, setSearch }) {
  const deptMap = Object.fromEntries((data.departments||[]).map(d => [d.id, d]));
  const deptName = (r) => deptMap[r.departmentId]?.name || '';
  const filtered = data.roles
    .filter(r => !search || r.name.toLowerCase().includes(search.toLowerCase()) || deptName(r).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => a.level - b.level || a.name.localeCompare(b.name));

  return (
    <aside className="sidebar">
      <div className="sb-head">
        <div>
          <h2>Cargos</h2>
          <p>Modelo reutilizável. Editar aqui afeta todos os ocupantes.</p>
        </div>
        <span className="count-chip">{data.roles.length}</span>
      </div>
      <div className="sb-body">
        <div className="field">
          <input className="input input-search" placeholder="Buscar cargo ou departamento…" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon"><Icon.Role /></div>
            <h3>Nenhum cargo</h3>
            <p>Crie cargos reutilizáveis (ex: Gerente, Açougueiro).</p>
          </div>

          <ul className="li-group">
            {filtered.map(r => {
              const count = data.employees.filter(e => e.roleId === r.id).length;
              return (
                <li key={r.id} className="li-item" onClick={() => setEditing({ kind: 'role', id: r.id })}>
                  <div className="li-square"><Icon.Role /></div>
                  <div className="li-body">
                    <div className="li-title">{r.name}</div>
                    <div className="li-sub">{deptName(r) || '—'} · {count} {count === 1 ? 'pessoa' : 'pessoas'}</div>
                  </div>
                  <div className="li-meta">
                    <span className={`level-chip ${levelClass(r.level)}`}>N{r.level}</span>
                    <span className="chev"><Icon.Chev /></span>
                  </div>
                </li>
              );
            })}
          </ul>
        )}
      </div>
      <div className="sb-add">
        <button className="btn btn-primary btn-block" onClick={() => setEditing({ kind: 'role', isNew: true })}>
          <Icon.Plus /> Novo cargo
        </button>
      </div>
    </aside>
  );
}

function PeopleSidebar({ data, setEditing, search, setSearch }) {
  const roleMap = Object.fromEntries(data.roles.map(r => [r.id, r]));
  const deptMap = Object.fromEntries((data.departments||[]).map(d => [d.id, d]));
  const deptName = (role) => deptMap[role?.departmentId]?.name || '';
  const filtered = data.employees
    .filter(e => {
      if (!search) return true;
      const q = search.toLowerCase();
      const role = roleMap[e.roleId];
      return e.name.toLowerCase().includes(q)
        || (role?.name||'').toLowerCase().includes(q)
        || deptName(role).toLowerCase().includes(q);
    })
    .sort((a,b) => a.name.localeCompare(b.name));

  return (
    <aside className="sidebar">
      <div className="sb-head">
        <div>
          <h2>Funcionários</h2>
          <p>Pessoas vinculadas a um cargo. Defina aqui o superior.</p>
        </div>
        <span className="count-chip">{data.employees.length}</span>
      </div>
      <div className="sb-body">
        <div className="field">
          <input className="input input-search" placeholder="Buscar por nome, cargo, departamento…" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>

        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon"><Icon.People /></div>
            <h3>{data.employees.length === 0 ? 'Nenhum funcionário' : 'Nada encontrado'}</h3>
            <p>{data.employees.length === 0 ? 'Comece cadastrando o diretor ou gerente.' : 'Tente outra busca.'}</p>
          </div>
        ) : (
          <ul className="li-group">
            {filtered.map(e => {
              const role = roleMap[e.roleId];
              const dn = deptName(role);
              return (
                <li key={e.id} className="li-item" onClick={() => setEditing({ kind: 'employee', id: e.id })}>
                  <div className="li-avatar" style={role?.level === 0 ? {background:'var(--ink)', color:'var(--bg)'} : null}>{initials(e.name)}</div>
                  <div className="li-body">
                    <div className="li-title">{e.name}</div>
                    <div className="li-sub">{role?.name || 'Sem cargo'}{dn ? ' · ' + dn : ''}</div>
                  </div>
                  <div className="li-meta">
                    {role && <span className={`level-chip ${levelClass(role.level)}`}>N{role.level}</span>}
                    <span className="chev"><Icon.Chev /></span>
                  </div>
                </li>
              );
            })}
          </ul>
        )}
      </div>
      <div className="sb-add">
        <button className="btn btn-primary btn-block" onClick={() => setEditing({ kind: 'employee', isNew: true })}>
          <Icon.Plus /> Novo funcionário
        </button>
      </div>
    </aside>
  );
}
